<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Pol Чат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/chat.css" rel="stylesheet">
    <script src="/static/chat.js" defer></script>
</head>
<body class="page-register">
    <div class="register-card">
        <h2 class="text-center mb-4">
            <i class="fas fa-user-plus"></i> Регистрация
        </h2>
        <form id="registerForm">
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="fas fa-user"></i> Имя пользователя
                </label>
                <input type="text" class="form-control" id="username" required
                       placeholder="от 3 до 20 символов, только буквы, цифры и _">
                <div class="form-text" id="usernameFeedback"></div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i> Пароль
                </label>
                <input type="password" class="form-control" id="password" required>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                    <span id="strengthText" class="small"></span>
                </div>
                <div id="penaltyWarnings"></div>
            </div>
            <div class="mb-3">
                <label for="confirm" class="form-label">
                    <i class="fas fa-check-circle"></i> Подтверждение пароля
                </label>
                <input type="password" class="form-control" id="confirm" required>
                <div class="form-text" id="confirmFeedback"></div>
            </div>

            <div class="password-hint">
                <h6><i class="fas fa-info-circle"></i> Требования к паролю:</h6>
                <ul class="requirement-list" id="requirements">
                    <li id="req-length"><i class="far fa-circle"></i> Минимум 6 символов</li>
                    <li id="req-digit"><i class="far fa-circle"></i> Хотя бы одна цифра</li>
                    <li id="req-upper"><i class="far fa-circle"></i> Хотя бы одна заглавная буква</li>
                    <li id="req-lower"><i class="far fa-circle"></i> Хотя бы одна строчная буква</li>
                    <li id="req-special"><i class="far fa-circle"></i> Хотя бы один спецсимвол (!@#$%^&* и т.д.)</li>
                </ul>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>
        </form>
        <hr>
        <p class="text-center mb-0">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </p>
    </div>
</body>
</html>
