<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pol Чат (WebApi/SignalR)</title>
    <!--
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    -->
    <link href="/static/ext/bootstrap.min.css" rel="stylesheet">
    <link href="/static/ext/all.min.css" rel="stylesheet">
    <script src="/static/ext/bootstrap.bundle.min.js"></script>
    <script src="/static/ext/signalr.min.js"></script>

    <link href="/static/chat.css" rel="stylesheet">
    <script src="/static/chat.js" defer></script>
</head>


<body class="page-chat">
    <div class="chat-container">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-comments"></i> Чат
                <small id="sidebar-username"><i class="fas fa-user"></i> Загрузка...</small>
            </div>
            <div class="channels-list">
                <div class="section-header">
                    <h6><i class="fas fa-hashtag"></i> Каналы</h6>
                    <button class="create-channel-btn" onclick="showCreateChannelModal()" title="Создать канал"><i class="fas fa-plus"></i></button>
                </div>
                <div id="channels-list"><div class="text-center text-muted py-3">Загрузка...</div></div>
            </div>
            <div class="dm-list">
                <div class="section-header"><h6><i class="fas fa-envelope"></i> Личные чаты</h6></div>
                <div id="dm-list"><div class="text-center text-muted py-3">Нет личных чатов</div></div>
            </div>
            <div class="users-list">
                <h6 class="mb-3"><i class="fas fa-users"></i> Пользователи</h6>
                <div id="users-list"><div class="text-center text-muted py-3">Загрузка...</div></div>
            </div>
            <div class="notification-settings">
                <label class="notification-toggle"><input type="checkbox" id="notificationToggle" checked> <span><i class="fas fa-bell"></i> Уведомления</span></label>
                <button class="test-notification-btn" onclick="testNotification()"><i class="fas fa-volume-up"></i> Тест</button>
            </div>
            <div class="p-3 border-top"><a href="/logout" class="btn btn-sm btn-danger w-100"><i class="fas fa-sign-out-alt"></i> Выйти</a></div>
        </div>
        <div class="main-chat">
            <div class="chat-header">
                <div class="channel-info" style="display: flex; align-items: center; gap: 10px;">
                    <h5 id="current-channel-name">Выберите чат</h5>
                    <p id="current-channel-desc"></p>
                    <div id="connectionStatus" class="connection-status online"><i class="fas fa-circle"></i></div>
                    <div class="server-time-indicators" style="display: flex; gap: 16px; margin-left: auto; font-size: 0.85rem;">
                        <div class="api-time" title="Время с сервера (Web API)">
                            <i class="fas fa-globe"></i> API: <span id="apiServerTime">--:--:--</span>
                        </div>
                        <div class="signalr-time" title="Время с сервера (SignalR)">
                            <i class="fas fa-bolt"></i> SignalR: <span id="signalrServerTime">--:--:--</span>
                        </div>
                    </div>
                </div>
                <div><button class="btn btn-sm btn-outline-primary" id="manageChannelBtn" onclick="openChannelSettings()"><i class="fas fa-cog"></i> Управление</button></div>
            </div>
            <div class="messages-area" id="messages-area">
                <div class="text-center text-muted mt-5"><i class="fas fa-comments fa-3x mb-3 d-block"></i>Выберите чат слева, чтобы начать общение</div>
            </div>
            <div class="typing-indicator" id="typingIndicator"><i class="fas fa-pencil-alt"></i> <span id="typingUser"></span> печатает...</div>
            <div class="input-area">
                <div id="filePreview" class="file-preview" style="display: none;">
                    <div class="preview-content"><i class="fas fa-paperclip"></i><span id="fileName"></span></div>
                    <button class="btn btn-sm btn-link" onclick="cancelFile()">✖</button>
                </div>
                <div id="replyPreview" class="reply-preview" style="display: none;">
                    <div class="reply-preview-content">
                        <i class="fas fa-reply" style="color: #007bff;"></i>
                        <div class="reply-info">
                            <span class="reply-to-name"></span>
                            <span class="reply-text"></span>
                        </div>
                    </div>
                    <button class="cancel-reply-btn" onclick="cancelReply()"><i class="fas fa-times"></i></button>
                </div>
                <div class="input-wrapper">
                    <button class="input-btn" type="button" id="emojiButton" title="Эмодзи">
                        <i class="far fa-smile"></i>
                    </button>
                    <textarea id="messageInput" placeholder="Введите сообщение... (Enter для отправки, Shift+Enter для новой строки)" rows="1" disabled></textarea>
                    <div class="input-actions">
                        <button class="input-btn" type="button" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(this)">
                        <button class="input-btn send-btn" type="button" id="sendButton" title="Отправить">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                        <div id="aiCancelContainer" style="display: none;">
                            <button id="cancelAiBtn" class="input-btn ai-cancel-btn" title="Отменить вызов AI">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div id="emojiPickerContainer" class="emoji-picker-container"></div>
                <div id="emojiSuggestion" class="emoji-suggestion"></div>
            </div>
        </div>
    </div>
    <div id="notification-area"></div>
    <div id="uploadProgress" class="upload-progress"><i class="fas fa-spinner fa-spin"></i> Загрузка файла...</div>
    <div id="uploadProgressContainer" class="upload-progress-container">
        <div class="upload-progress-header">
            <i class="fas fa-cloud-upload-alt"></i>
            <span id="uploadFileName">Загрузка файла...</span>
        </div>
        <div class="upload-progress-bar-wrapper">
            <div class="upload-progress-bar" id="uploadProgressBar"></div>
        </div>
        <div class="upload-progress-percent">
            <span id="uploadPercent">0</span>%
        </div>
        <div class="upload-progress-status" id="uploadStatus">
            <i class="fas fa-spinner fa-spin"></i> Подготовка...
        </div>
    </div>
    <div id="pastePreview" class="paste-preview" style="display: none;"></div>
    <div class="scroll-buttons">
        <button class="scroll-btn" id="scrollToTopBtn" title="В начало">
            <i class="fas fa-arrow-up"></i>
        </button>
        <button class="scroll-btn" id="scrollToBottomBtn" title="В конец">
            <i class="fas fa-arrow-down"></i>
        </button>
    </div>
</body>
</html>
